<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hana – Travel AI Assistant</title>
  <meta name="description" content="Hana – Trợ lý du lịch AI thông minh powered by Google Gemini. Lên kế hoạch chuyến đi, tính ngân sách, tìm điểm đến." />

  <!-- Fonts: Outfit (display) + JetBrains Mono (code/tool badges) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- ── App Shell ─────────────────────────────────────────── -->
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="16" cy="16" r="15" stroke="url(#logoGrad)" stroke-width="2"/>
            <path d="M10 22 L16 8 L22 22 M12.5 17.5 h7" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#38bdf8"/>
                <stop offset="100%" stop-color="#0ea5e9"/>
              </linearGradient>
            </defs>
          </svg>
          <span>Hana</span>
        </div>
        <p class="logo-tagline">Travel AI Assistant</p>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Gợi ý nhanh</p>
        <ul class="suggestion-list" id="suggestionList">
          <li><button class="suggestion-chip" data-msg="Tôi muốn đi du lịch Đà Nẵng 3 ngày, ngân sách 5 triệu. Gợi ý lịch trình?">
            <span class="chip-icon">✈</span> Lịch trình Đà Nẵng 3N
          </button></li>
          <li><button class="suggestion-chip" data-msg="Tháng 3 nên đi du lịch ở đâu ở Việt Nam?">
            <span class="chip-icon">🗓</span> Tháng 3 đi đâu đẹp?
          </button></li>
          <li><button class="suggestion-chip" data-msg="Lên kế hoạch đi Phú Quốc 5 ngày cho cặp đôi, budget tầm 10 triệu">
            <span class="chip-icon">🏝</span> Phú Quốc cho cặp đôi
          </button></li>
          <li><button class="suggestion-chip" data-msg="Các điểm du lịch nổi tiếng ở miền Bắc Việt Nam?">
            <span class="chip-icon">🏔</span> Điểm đến miền Bắc
          </button></li>
          <li><button class="suggestion-chip" data-msg="Chi phí di chuyển và ăn ở tại Hội An trong 2 ngày hết bao nhiêu?">
            <span class="chip-icon">💰</span> Chi phí Hội An 2N
          </button></li>
        </ul>
      </div>

      <div class="sidebar-section sidebar-info">
        <p class="sidebar-label">Trạng thái</p>
        <div class="status-row" id="statusRow">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Đang kết nối…</span>
        </div>
        <div class="model-badge" id="modelBadge">—</div>
      </div>

      <div class="sidebar-footer">
        <button id="clearBtn" class="clear-btn" title="Xóa lịch sử chat">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
            <path d="M2 4h12M6 4V2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5V4M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Xóa cuộc trò chuyện
        </button>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main id="chatMain">

      <!-- Header -->
      <header id="chatHeader">
        <button id="sidebarToggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 18 14" fill="none" width="18" height="14">
            <path d="M1 1h16M1 7h10M1 13h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="header-title">
          <span class="header-name">Hana</span>
          <span class="header-sub" id="headerSub">Trợ lý du lịch AI</span>
        </div>
        <div class="header-actions">
          <span class="search-badge" id="searchBadge" title="Tìm kiếm web">
            <svg viewBox="0 0 16 16" fill="none" width="12" height="12">
              <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="m10 10 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Web Search
          </span>
        </div>
      </header>

      <!-- Messages -->
      <div id="messageArea" role="log" aria-live="polite" aria-label="Lịch sử trò chuyện">
        <!-- Welcome state -->
        <div id="welcomeState">
          <div class="welcome-hero">
            <div class="welcome-orb" aria-hidden="true"></div>
            <h1>Xin chào, tôi là <em>Hana</em></h1>
            <p>Trợ lý du lịch AI của bạn. Hỏi tôi về lịch trình, ngân sách, địa điểm — bất cứ điều gì về chuyến đi.</p>
          </div>
        </div>
      </div>

      <!-- Typing indicator (hidden by default) -->
      <div id="typingIndicator" class="typing-wrap" hidden>
        <div class="msg msg-ai">
          <div class="msg-avatar" aria-hidden="true">H</div>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div id="inputArea">
        <form id="chatForm" autocomplete="off">
          <div class="input-wrap">
            <textarea
              id="msgInput"
              rows="1"
              placeholder="Hỏi tôi về chuyến đi của bạn…"
              aria-label="Nhập câu hỏi du lịch"
              maxlength="2000"
            ></textarea>
            <div class="input-actions">
              <span class="char-count" id="charCount">0/2000</span>
              <button type="submit" id="sendBtn" aria-label="Gửi tin nhắn" disabled>
                <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
                  <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
          <p class="input-hint">Nhấn Enter để gửi · Shift+Enter xuống dòng</p>
        </form>
      </div>

    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
